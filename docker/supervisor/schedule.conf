[program:laravel-schedule]
command=php /var/www/html/artisan schedule:run
autostart=true
autorestart=false
user=sail
redirect_stderr=true
stdout_logfile=/var/www/html/storage/logs/schedule.log

stdout_logfile_maxbytes=10MB   ; Максимальный размер файла (можно использовать KB, MB, GB)
stdout_logfile_backups=5       ; Количество хранимых архивов (файлы: schedule.log.1, .2, ...)